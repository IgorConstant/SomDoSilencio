name: Docker Build and Test

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: user/app:pr-${{ github.event.pull_request.number }}

      - name: Run backend and frontend tests in Docker container
        run: |
          docker build -t test-image .
          # Testes do backend
          docker run --rm test-image sh -c "cd backend && npm install && npm test"
          # Testes do frontend com backend rodando em background
          docker run --rm -p 5001:5001 test-image sh -c "\
            cd backend && npm install && npm start & \
            cd ../frontend && npm install && \
            npx wait-on http://localhost:5001/api/posts && \
            npm test -- --watch=false --browsers=ChromeHeadless
          "